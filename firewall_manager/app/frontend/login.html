<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>로그인 - Firewall Analysis Tool</title>
    <link rel="icon" href="/static/images/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/static/vendor/bulma/css/versions/bulma-no-dark-mode.min.css" />
    <link rel="stylesheet" href="/static/vendor/font-awesome/css/all.min.css" />
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f5f5f5;
      }
      .login-box {
        width: 100%;
        max-width: 400px;
        padding: 2rem;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      }
      .login-logo {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .login-logo .logo-text {
        font-size: 2rem;
        font-weight: 800;
        color: #363636;
        letter-spacing: 2px;
      }
      .login-logo .logo-sub {
        display: block;
        font-size: 0.85rem;
        color: #7a7a7a;
        margin-top: 0.25rem;
      }
      #error-msg { display: none; }
    </style>
  </head>
  <body>
    <div class="login-box">
      <div class="login-logo">
        <span class="logo-text">FAT</span>
        <span class="logo-sub">Firewall Analysis Tool</span>
      </div>

      <form id="login-form">
        <div class="field">
          <label class="label">아이디</label>
          <div class="control has-icons-left">
            <input id="username" class="input" type="text" placeholder="아이디" autocomplete="username" required />
            <span class="icon is-left"><i class="fas fa-user"></i></span>
          </div>
        </div>

        <div class="field">
          <label class="label">비밀번호</label>
          <div class="control has-icons-left">
            <input id="password" class="input" type="password" placeholder="비밀번호" autocomplete="current-password" required />
            <span class="icon is-left"><i class="fas fa-lock"></i></span>
          </div>
        </div>

        <div id="error-msg" class="notification is-danger is-light" style="padding: 0.75rem 1rem; margin-bottom: 1rem;">
          <span id="error-text"></span>
        </div>

        <div class="field">
          <div class="control">
            <button id="submit-btn" class="button is-dark is-fullwidth" type="submit">
              <span class="icon"><i class="fas fa-sign-in-alt"></i></span>
              <span>로그인</span>
            </button>
          </div>
        </div>
      </form>
    </div>

    <script>
      const form = document.getElementById('login-form');
      const errorMsg = document.getElementById('error-msg');
      const errorText = document.getElementById('error-text');
      const submitBtn = document.getElementById('submit-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.style.display = 'none';
        submitBtn.classList.add('is-loading');
        submitBtn.disabled = true;

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
          const body = new URLSearchParams({ username, password });
          const res = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: body.toString(),
          });

          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.detail || '로그인에 실패했습니다');
          }

          const { access_token } = await res.json();

          // Store token in localStorage for API calls
          localStorage.setItem('fat_token', access_token);

          // Store token in cookie for middleware page-access check
          const maxAge = 60 * 60 * 8; // 8 hours
          document.cookie = `access_token=${access_token}; path=/; max-age=${maxAge}; SameSite=Strict`;

          window.location.href = '/';
        } catch (err) {
          errorText.textContent = err.message;
          errorMsg.style.display = 'block';
        } finally {
          submitBtn.classList.remove('is-loading');
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
